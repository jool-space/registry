# Reusable workflow: register the calling package into registry.jool.space,
# tag the release commit, and create a GitHub release. Called from package
# repos; see examples/release.yml for the caller.
#
# Every step is skip-if-already-done, so re-running a failed run heals it.
name: Register

on:
  workflow_call:
    inputs:
      bump:
        description: current | patch | minor | major | x.y.z
        type: string
        default: current
    secrets:
      REGISTRY_DEPLOY_KEY:
        description: SSH deploy key with write access to jool-space/registry
        required: true
      JOOL_BOT_TOKEN:
        description: >-
          PAT of the jool-bot machine account (repo + workflow scopes).
          Pushes made with GITHUB_TOKEN don't trigger other workflows, so
          without this the bump commit and tag get no CI or docs build.
        required: false

concurrency:
  group: register-${{ github.repository }}

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: package
          fetch-depth: 0
          token: ${{ secrets.JOOL_BOT_TOKEN || github.token }}
      - uses: actions/checkout@v6
        with:
          repository: jool-space/registry
          ssh-key: ${{ secrets.REGISTRY_DEPLOY_KEY }}
          path: registry
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - name: Register and tag
        id: reg
        working-directory: package
        run: |
          julia --project=../registry/scripts -e 'using Pkg; Pkg.instantiate()'
          julia --project=../registry/scripts ../registry/scripts/register.jl
        env:
          BUMP: ${{ inputs.bump }}
          REGISTRY_PATH: ../registry
          GH_TOKEN: ${{ github.token }}
      - name: GitHub release
        run: |
          gh release view "v$VERSION" -R "$GH_REPO" >/dev/null 2>&1 ||
            gh release create "v$VERSION" -R "$GH_REPO" --title "v$VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.JOOL_BOT_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.reg.outputs.version }}
